# ── JWT SECURITY POLICY ────────────────────────────────────────────────────────
# Default: verify_jwt = true on ALL functions.
# Exceptions:
#   stripe-webhook  → Stripe signature replaces JWT (external caller)
#   csp-report      → Public endpoint by spec (no user session)
#   cron functions  → Called by pg_cron (no JWT), protected by X-CRON-SECRET instead
# ──────────────────────────────────────────────────────────────────────────────

